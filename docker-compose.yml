# ha-staging-kit — single container (web UI + config sync + optional MQTT mirror)
# Copy config.example.env → .env before: docker compose up -d --build

services:
  staging-kit:
    build: .
    image: ha-staging-kit:local
    container_name: ha-staging-kit
    restart: unless-stopped
    env_file: .env
    ports:
      - "${CONSOLE_PORT:-8081}:8080"
      - "${MIRROR_PORT:-1883}:1883"
    volumes:
      - ./.env:/kit/.env:rw
      - .:/kit
      - ${HA_CONFIG_REPO}:/repo:rw
      - ${HA_STAGING_CONFIG}:/ha-config
      - ${SIDECAR_DATA}:/sidecar-data
      - ${MIRROR_DATA}:${MIRROR_DATA}
      - ${HA_CONFIG_REPO}:${HA_CONFIG_REPO}:ro
      - /mnt/user:/mnt/user:ro
      - /mnt/cache:/mnt/cache:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      SIDECAR_DATA: /sidecar-data
      SIDECAR_CONFIG: /sidecar-data/config.env
      KIT_ROOT: /kit
      KIT_CONTAINER: ha-staging-kit
      REPO_DIR: /repo
      HA_CONFIG: /ha-config
